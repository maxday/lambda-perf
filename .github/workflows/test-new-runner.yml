name: test build arm on macos-14

on:
  push:
    
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v3
      - name: Install docker
        run: brew install docker --cask
      - name: Install colima
        run: brew install colima
      - name: Start colima
        run: colima start
      - name: Run docker ps
        run: docker ps
      - name: Build
        run: cd s3-uploader/runtimes/rust_on_provided_al2023 && docker build .
