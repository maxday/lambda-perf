name: test build arm on macos-14

on:
  push:
    
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v3
      - name: Install docker
        run: brew install docker --cask
      - name: Open docker
        run: open /Applications/Docker.app
      - name: Wait for docker to start
        run: sleep 30
      - name: Create default docker-machine
        run: docker-machine create default
      - name: test build arm
        run: cd s3-uploader && ./runtimes/rust_on_provided_al2023/build.sh rust_on_provided_al2023 arm64




